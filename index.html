
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    background: #090f1d;
    color: var(--color-text-primary, #f4f6ff);
  }
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: var(--app-vh, 100dvh);
    margin: 0;
    padding:
      max(0.8rem, env(safe-area-inset-top))
      max(0.75rem, env(safe-area-inset-right))
      max(0.75rem, env(safe-area-inset-bottom))
      max(0.75rem, env(safe-area-inset-left));
    border-radius: 0;
    border: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(100, 123, 255, 0.14), transparent 44%),
      radial-gradient(circle at 85% 92%, rgba(67, 224, 166, 0.12), transparent 38%),
      linear-gradient(155deg, #111526 0%, #0b1020 58%, #0d1529 100%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    font-family: var(--font-mono, "Inter", "Segoe UI", "Roboto", sans-serif);
    user-select: none;
  }
  #game-title {
    margin-bottom: 0.9rem;
    font-size: clamp(15px, 2.3vw, 20px);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.94);
  }
  #score-bar {
    display: flex;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1rem;
    font-size: 12px;
    color: rgba(227, 234, 255, 0.84);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .score-pill {
    min-width: 118px;
    flex: 1 1 118px;
    max-width: 180px;
    padding: 11px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));
    text-align: center;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }
  .score-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(227, 234, 255, 0.74);
  }
  .score-value {
    display: block;
    margin-top: 0.2rem;
    font-size: 21px;
    letter-spacing: normal;
    text-transform: none;
    color: #fff;
    font-weight: 700;
  }
  #canvas-wrap {
    position: relative;
    width: fit-content;
    border: 1px solid rgba(122, 147, 255, 0.38);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 14px 26px rgba(0, 0, 0, 0.42),
      inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  canvas {
    display: block;
    width: 500px;
    height: auto;
    image-rendering: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.95rem;
    background:
      linear-gradient(165deg, rgba(12, 15, 28, 0.88), rgba(8, 11, 20, 0.93)),
      rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(3px);
    border-radius: 14px;
    text-align: center;
    padding: 0 1.2rem;
  }
  #overlay h2 {
    font-size: 40px;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 800;
    color: #fff;
  }
  #overlay p { font-size: 16px; color: rgba(255,255,255,0.82); }
  #overlay .final-score {
    font-size: 17px;
    color: rgba(255,255,255,0.94);
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.13);
  }
  #overlay button {
    margin-top: 0.5rem;
    padding: 12px 34px;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: var(--font-mono);
    background: linear-gradient(160deg, #42e091 0%, #20b86b 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    box-shadow: 0 8px 18px rgba(32, 184, 107, 0.34);
  }
  #overlay button:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
    box-shadow: 0 11px 24px rgba(32, 184, 107, 0.42);
  }
  #hint {
    margin-top: 0.8rem;
    font-size: clamp(12px, 1.8vw, 14px);
    letter-spacing: 0.02em;
    color: rgba(210, 223, 255, 0.78);
  }
  #controls-copy {
    font-size: 13px;
    color: rgba(255,255,255,0.68);
    margin-top: 0.15rem;
  }
  @media (max-width: 560px) {
    #game-wrapper {
      justify-content: flex-start;
      padding-top: max(0.7rem, env(safe-area-inset-top));
      padding-bottom: max(0.7rem, env(safe-area-inset-bottom));
    }
    #game-title {
      display: none;
    }
    #score-bar {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 0.25rem;
      margin-bottom: 0.4rem;
    }
    .score-pill {
      min-width: 0;
      max-width: none;
      flex: 1 1 0;
      width: auto;
      padding: 5px 4px;
      border-radius: 8px;
    }
    .score-label { font-size: 8px; letter-spacing: 0.04em; }
    .score-value { font-size: 13px; margin-top: 0.06rem; }
    #overlay h2 { font-size: 28px; }
    #overlay p { font-size: 13px; }
    #overlay button { font-size: 13px; padding: 10px 22px; }
    #controls-copy { font-size: 12px; }
    #hint { display: none; }
  }
  @media (max-width: 420px) {
    #game-wrapper {
      padding: 0.65rem 0.5rem 0.72rem;
    }
    #score-bar { gap: 0.32rem; margin-bottom: 0.5rem; }
    .score-pill { padding: 5px 4px; }
    .score-label { font-size: 8px; letter-spacing: 0.03em; }
    .score-value { margin: 0.04rem 0 0; font-size: 12px; }
    #overlay { gap: 0.65rem; padding: 0 0.65rem; }
    #overlay h2 { font-size: 24px; }
    #overlay p { font-size: 12px; }
    #overlay button { padding: 9px 20px; font-size: 12px; }
    #hint { margin-top: 0.4rem; }
  }
  @media (max-height: 640px) {
    #game-title { margin-bottom: 0.35rem; }
    #score-bar { margin-bottom: 0.4rem; }
    #hint { display: none; }
    #overlay h2 { font-size: 24px; }
    #overlay p { font-size: 12px; }
    #controls-copy { font-size: 11px; }
  }
  @media (max-height: 480px) and (orientation: landscape) {
    #game-wrapper {
      justify-content: flex-start;
      padding-top: max(0.45rem, env(safe-area-inset-top));
      padding-bottom: max(0.45rem, env(safe-area-inset-bottom));
    }
    #game-title { display: none; }
    #score-bar {
      width: min(520px, 98vw);
      margin-bottom: 0.35rem;
      gap: 0.25rem;
    }
    .score-pill { padding: 5px 7px; font-size: 10px; }
    .score-label { font-size: 9px; }
    .score-value { margin-top: 0.02rem; font-size: 13px; }
  }
  @media (max-height: 700px) {
    #game-wrapper { padding-top: 0.55rem; padding-bottom: 0.6rem; }
    #game-title { margin-bottom: 0.45rem; }
    #score-bar { margin-bottom: 0.5rem; }
    #hint { margin-top: 0.5rem; }
  }
</style>

<div id="game-wrapper">
  <div id="game-title">Snake: Neon Run</div>
  <div id="score-bar">
    <div class="score-pill"><span class="score-label">Score</span><span class="score-value" id="score-val">0</span></div>
    <div class="score-pill"><span class="score-label">Best</span><span class="score-value" id="best-val">0</span></div>
    <div class="score-pill"><span class="score-label">Speed</span><span class="score-value" id="speed-val">1</span></div>
    <div class="score-pill"><span class="score-label">Level</span><span class="score-value" id="level-val">1</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="overlay">
      <h2 id="ov-title">Snake</h2>
      <p id="ov-sub">Eat apples. Don't crash.</p>
      <p id="ov-fs" class="final-score" style="display:none"></p>
      <button id="ov-btn">Start Game</button>
      <p id="controls-copy">Arrow keys or swipe to move</p>
    </div>
  </div>
  <div id="hint">↑ ↓ ← → to move &nbsp;·&nbsp; swipe on mobile</div>
</div>

<script>
(function(){
  // ── CONFIG ──────────────────────────────────────────────
  const CELL = 20;
  const COLS = 32;
  const ROWS = 24;
  const W = COLS * CELL;
  const H = ROWS * CELL;
  const BASE_INTERVAL = 160;
  const MIN_INTERVAL  = 60;
  const SPEED_STEP    = 8;
  const LEVEL_STEP    = 6;
  const MAX_LEVELS    = 5;

  // ── CANVAS SETUP ────────────────────────────────────────
  const canvas = document.getElementById('gc');
  const gameWrapper = document.getElementById('game-wrapper');
  const gameTitle = document.getElementById('game-title');
  const scoreBar = document.getElementById('score-bar');
  const hint = document.getElementById('hint');
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  function getViewportSize() {
    if(window.visualViewport) {
      return {
        width: window.visualViewport.width,
        height: window.visualViewport.height
      };
    }
    return {
      width: window.innerWidth,
      height: window.innerHeight
    };
  }

  function updateViewportHeightVar() {
    const viewport = getViewportSize();
    document.documentElement.style.setProperty('--app-vh', `${Math.floor(viewport.height)}px`);
  }

  function resizeCanvasDisplay() {
    const viewport = getViewportSize();
    const viewportWidth = viewport.width;
    const viewportHeight = viewport.height;
    const wrapperStyles = getComputedStyle(gameWrapper);
    const horizontalPadding = parseFloat(wrapperStyles.paddingLeft) + parseFloat(wrapperStyles.paddingRight);
    const verticalPadding = parseFloat(wrapperStyles.paddingTop) + parseFloat(wrapperStyles.paddingBottom);
    const baseWidth = Math.max(220, viewportWidth - horizontalPadding - 6);
    const chromeHeight =
      gameTitle.offsetHeight +
      scoreBar.offsetHeight +
      hint.offsetHeight +
      verticalPadding +
      16;
    const baseHeight = Math.max(180, viewportHeight - chromeHeight);
    const widthByHeight = baseHeight * (W / H);
    const isMobile = viewportWidth <= 560;
    const minWidth = isMobile ? 240 : 200;
    const targetWidth = Math.floor(Math.max(minWidth, Math.min(W, baseWidth, widthByHeight)));
    canvas.style.width = `${targetWidth}px`;
    canvas.style.height = `${Math.floor(targetWidth * (H / W))}px`;
  }

  // Theme colors (works in dark/light mode)
  const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
  const COLORS = {
    bg:        () => isDark() ? '#0f1117' : '#ecf1ff',
    bgAlt:     () => isDark() ? '#111a2c' : '#dde6ff',
    grid:      () => isDark() ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)',
    snakeHead: () => '#3ddc84',
    snakeBody: () => '#2ab369',
    snakeDark: () => '#1a8a4e',
    apple:     () => '#e74c3c',
    appleShine:() => 'rgba(255,255,255,0.4)',
    text:      () => isDark() ? '#eee' : '#111',
  };

  // ── STATE ────────────────────────────────────────────────
  let snake, dir, nextDir, apple, score, best, level, obstacles, obstacleSet, running, gameOver, loopId;
  best = 0;

  function getStartSnake() {
    const centerX = Math.floor(COLS / 2);
    const centerY = Math.floor(ROWS / 2);
    return [
      {x:centerX, y:centerY},
      {x:centerX - 1, y:centerY},
      {x:centerX - 2, y:centerY}
    ];
  }

  function init() {
    snake = getStartSnake();
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    score = 0;
    level = 1;
    obstacles = [];
    obstacleSet = new Set();
    updateLevelObstacles(true);
    apple = randomApple();
    running = true;
    gameOver = false;
    updateHUD();
    if(loopId) clearTimeout(loopId);
    loop();
    document.getElementById('overlay').style.display = 'none';
  }

  function randomApple() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while(
      snake.some(s => s.x===pos.x && s.y===pos.y) ||
      obstacleSet.has(posKey(pos.x, pos.y))
    );
    return pos;
  }

  function posKey(x, y) {
    return `${x},${y}`;
  }

  function hLine(y, fromX, toX) {
    const cells = [];
    for(let x = fromX; x <= toX; x++) cells.push({x, y});
    return cells;
  }

  function vLine(x, fromY, toY) {
    const cells = [];
    for(let y = fromY; y <= toY; y++) cells.push({x, y});
    return cells;
  }

  function levelFromScore() {
    return Math.min(MAX_LEVELS, Math.floor(score / LEVEL_STEP) + 1);
  }

  function levelPattern(lvl) {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    const left = Math.floor(COLS * 0.25);
    const right = Math.floor(COLS * 0.75);
    const top = Math.floor(ROWS * 0.25);
    const bottom = Math.floor(ROWS * 0.75);

    if(lvl === 1) return [];
    if(lvl === 2) {
      return [
        ...hLine(top, 3, COLS - 4).filter(c => Math.abs(c.x - cx) > 1),
        ...hLine(bottom, 3, COLS - 4).filter(c => Math.abs(c.x - cx) > 1),
      ];
    }
    if(lvl === 3) {
      return [
        ...vLine(left, 2, ROWS - 3).filter(c => Math.abs(c.y - cy) > 1),
        ...vLine(right, 2, ROWS - 3).filter(c => Math.abs(c.y - cy) > 1),
      ];
    }
    if(lvl === 4) {
      return [
        ...hLine(3, 5, COLS - 6).filter(c => Math.abs(c.x - cx) > 1),
        ...hLine(ROWS - 4, 5, COLS - 6).filter(c => Math.abs(c.x - cx) > 1),
        ...vLine(5, 3, ROWS - 4).filter(c => Math.abs(c.y - cy) > 1),
        ...vLine(COLS - 6, 3, ROWS - 4).filter(c => Math.abs(c.y - cy) > 1),
      ];
    }
    return [
      ...hLine(top, 2, COLS - 3).filter(c => Math.abs(c.x - cx) > 2),
      ...hLine(bottom, 2, COLS - 3).filter(c => Math.abs(c.x - cx) > 2),
      ...vLine(cx, 2, ROWS - 3).filter(c => Math.abs(c.y - cy) > 2),
      ...vLine(left, 4, ROWS - 5).filter(c => Math.abs(c.y - cy) > 1),
      ...vLine(right, 4, ROWS - 5).filter(c => Math.abs(c.y - cy) > 1),
    ];
  }

  function updateLevelObstacles(force) {
    const nextLevel = levelFromScore();
    if(!force && nextLevel === level) return;
    level = nextLevel;

    const snakeCells = new Set((snake || []).map(s => posKey(s.x, s.y)));
    const unique = new Set();
    obstacles = levelPattern(level).filter(c => {
      if(c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS) return false;
      const key = posKey(c.x, c.y);
      if(unique.has(key) || snakeCells.has(key)) return false;
      unique.add(key);
      return true;
    });
    obstacleSet = new Set(obstacles.map(c => posKey(c.x, c.y)));

    if(apple && obstacleSet.has(posKey(apple.x, apple.y))) {
      apple = randomApple();
    }
  }

  function currentInterval() {
    const lvl = Math.floor(score / SPEED_STEP);
    return Math.max(MIN_INTERVAL, BASE_INTERVAL - lvl * 15);
  }

  // ── GAME LOOP ────────────────────────────────────────────
  function loop() {
    if(!running) return;
    tick();
    draw();
    if(!gameOver) loopId = setTimeout(loop, currentInterval());
  }

  function tick() {
    dir = {...nextDir};

    // New head
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if(head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if(snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }
    // Obstacle collision
    if(obstacleSet.has(posKey(head.x, head.y))) {
      endGame(); return;
    }

    snake.unshift(head);

    if(head.x === apple.x && head.y === apple.y) {
      score++;
      if(score > best) best = score;
      updateLevelObstacles(false);
      playEat();
      apple = randomApple();
      updateHUD();
    } else {
      snake.pop();
    }
  }

  function endGame() {
    running = false;
    gameOver = true;
    playDie();
    showOverlay('Game Over', `Reached level ${level}`, `Final score: ${score}`);
  }

  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('best-val').textContent  = best;
    const spd = Math.floor(score / SPEED_STEP) + 1;
    document.getElementById('speed-val').textContent = spd;
    document.getElementById('level-val').textContent = level;
  }

  // ── DRAW ─────────────────────────────────────────────────
  function draw() {
    // Background
    const boardGradient = ctx.createLinearGradient(0, 0, W, H);
    boardGradient.addColorStop(0, COLORS.bg());
    boardGradient.addColorStop(1, COLORS.bgAlt());
    ctx.fillStyle = boardGradient;
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = COLORS.grid();
    ctx.lineWidth = 0.5;
    for(let c=0; c<=COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke();
    }
    for(let r=0; r<=ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke();
    }

    // Obstacles
    drawObstacles();

    // Apple
    drawApple(apple.x, apple.y);

    // Snake (body first, then head on top)
    for(let i = snake.length-1; i >= 0; i--) {
      drawSegment(snake[i], i);
    }
  }

  function drawSegment(seg, i) {
    const x = seg.x * CELL + 1;
    const y = seg.y * CELL + 1;
    const sz = CELL - 2;
    const r = i === 0 ? 6 : 4;

    // Glow for head
    if(i === 0) {
      ctx.save();
      ctx.shadowColor = '#3ddc84';
      ctx.shadowBlur  = 10;
    }

    ctx.fillStyle = i === 0 ? COLORS.snakeHead() :
                    i % 2 === 0 ? COLORS.snakeBody() : COLORS.snakeDark();
    roundRect(ctx, x, y, sz, sz, r);
    ctx.fill();

    if(i === 0) {
      // Eyes
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.fillStyle = '#0f1117';
      const ex = dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.65;
      const ex2= dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.25;
      const ey = dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.25;
      const ey2= dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.65;
      ctx.beginPath();
      ctx.arc(seg.x*CELL + CELL*ex,  seg.y*CELL + CELL*ey,  2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(seg.x*CELL + CELL*ex2, seg.y*CELL + CELL*ey2, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawApple(gx, gy) {
    const cx = gx * CELL + CELL/2;
    const cy = gy * CELL + CELL/2;
    const rad = CELL/2 - 2;

    ctx.save();
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = COLORS.apple();
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Shine
    ctx.fillStyle = COLORS.appleShine();
    ctx.beginPath();
    ctx.arc(cx - rad*0.25, cy - rad*0.3, rad*0.35, 0, Math.PI*2);
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - rad);
    ctx.quadraticCurveTo(cx + 4, cy - rad - 5, cx + 3, cy - rad - 7);
    ctx.stroke();
  }

  function drawObstacles() {
    for(let i = 0; i < obstacles.length; i++) {
      const o = obstacles[i];
      const x = o.x * CELL + 2;
      const y = o.y * CELL + 2;
      const sz = CELL - 4;

      ctx.fillStyle = isDark() ? '#6f7a96' : '#7f8cac';
      roundRect(ctx, x, y, sz, sz, 4);
      ctx.fill();

      // Inner highlight for better visibility on all themes
      ctx.strokeStyle = isDark() ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      roundRect(ctx, x + 0.5, y + 0.5, sz - 1, sz - 1, 3);
      ctx.stroke();
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // ── SOUND ────────────────────────────────────────────────
  let audioCtx;
  function getAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playEat() {
    try {
      const ac = getAudio();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(440, ac.currentTime);
      o.frequency.linearRampToValueAtTime(880, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.12);
      o.start(); o.stop(ac.currentTime + 0.12);
    } catch(e) {}
  }
  function playDie() {
    try {
      const ac = getAudio();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sawtooth';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(220, ac.currentTime);
      o.frequency.linearRampToValueAtTime(80, ac.currentTime + 0.4);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.4);
      o.start(); o.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  // ── OVERLAY ──────────────────────────────────────────────
  function showOverlay(title, sub, fs) {
    const ov = document.getElementById('overlay');
    document.getElementById('ov-title').textContent = title;
    document.getElementById('ov-sub').textContent   = sub;
    const fsEl = document.getElementById('ov-fs');
    if(fs) { fsEl.textContent = fs; fsEl.style.display = ''; }
    else   { fsEl.style.display = 'none'; }
    document.getElementById('ov-btn').textContent = gameOver ? 'Play Again' : 'Start Game';
    ov.style.display = 'flex';
  }

  document.getElementById('ov-btn').addEventListener('click', () => {
    init();
  });

  // ── KEYBOARD ─────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp:    {x:0, y:-1},
      ArrowDown:  {x:0, y:1},
      ArrowLeft:  {x:-1, y:0},
      ArrowRight: {x:1, y:0},
    };
    const d = map[e.key];
    if(d) {
      e.preventDefault();
      // Prevent reverse
      if(d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  // ── TOUCH / SWIPE ─────────────────────────────────────────
  let tx0, ty0;
  canvas.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if(Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let nd;
    if(Math.abs(dx) > Math.abs(dy))
      nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    else
      nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if(nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }, {passive:false});

  // ── INITIAL DRAW ─────────────────────────────────────────
  function handleViewportChange() {
    updateViewportHeightVar();
    resizeCanvasDisplay();
  }

  window.addEventListener('resize', handleViewportChange);
  window.addEventListener('orientationchange', handleViewportChange);
  if(window.visualViewport) {
    window.visualViewport.addEventListener('resize', handleViewportChange);
    window.visualViewport.addEventListener('scroll', handleViewportChange);
  }

  // Draw blank board behind the start overlay
  snake = getStartSnake();
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  level = 1;
  obstacles = [];
  obstacleSet = new Set();
  updateLevelObstacles(true);
  apple = randomApple();
  handleViewportChange();
  draw();
  updateHUD();
})();
</script>
