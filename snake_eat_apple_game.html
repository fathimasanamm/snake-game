
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0;
    font-family: var(--font-mono);
    user-select: none;
  }
  #score-bar {
    display: flex;
    gap: 2rem;
    margin-bottom: 1rem;
    font-size: 14px;
    color: var(--color-text-secondary);
  }
  #score-bar span { color: var(--color-text-primary); font-weight: 500; }
  #canvas-wrap {
    position: relative;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    overflow: hidden;
  }
  canvas { display: block; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem;
    background: rgba(0,0,0,0.82);
    border-radius: var(--border-radius-md);
  }
  #overlay h2 { font-size: 22px; font-weight: 500; color: #fff; }
  #overlay p { font-size: 13px; color: rgba(255,255,255,0.55); }
  #overlay .final-score { font-size: 15px; color: rgba(255,255,255,0.8); }
  #overlay button {
    margin-top: 0.5rem;
    padding: 10px 28px;
    font-size: 14px;
    font-family: var(--font-mono);
    background: #3a3;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  #overlay button:hover { background: #4b4; }
  #hint { margin-top: 0.75rem; font-size: 12px; color: var(--color-text-secondary); }
</style>

<div id="game-wrapper">
  <div id="score-bar">
    Score: <span id="score-val">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Best: <span id="best-val">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Speed: <span id="speed-val">1</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="overlay">
      <h2 id="ov-title">Snake</h2>
      <p id="ov-sub">Eat apples. Don't crash.</p>
      <p id="ov-fs" class="final-score" style="display:none"></p>
      <button id="ov-btn">Start Game</button>
      <p style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:0.25rem">Arrow keys or swipe to move</p>
    </div>
  </div>
  <div id="hint">↑ ↓ ← → to move &nbsp;·&nbsp; swipe on mobile</div>
</div>

<script>
(function(){
  // ── CONFIG ──────────────────────────────────────────────
  const CELL = 20;
  const COLS = 25;
  const ROWS = 20;
  const W = COLS * CELL;
  const H = ROWS * CELL;
  const BASE_INTERVAL = 160;
  const MIN_INTERVAL  = 60;
  const SPEED_STEP    = 8;

  // ── CANVAS SETUP ────────────────────────────────────────
  const canvas = document.getElementById('gc');
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Theme colors (works in dark/light mode)
  const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
  const COLORS = {
    bg:        () => isDark() ? '#0f1117' : '#f5f5f2',
    grid:      () => isDark() ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)',
    snakeHead: () => '#3ddc84',
    snakeBody: () => '#2ab369',
    snakeDark: () => '#1a8a4e',
    apple:     () => '#e74c3c',
    appleShine:() => 'rgba(255,255,255,0.4)',
    text:      () => isDark() ? '#eee' : '#111',
  };

  // ── STATE ────────────────────────────────────────────────
  let snake, dir, nextDir, apple, score, best, running, gameOver, loopId;
  best = 0;

  function init() {
    snake = [
      {x:12, y:10}, {x:11, y:10}, {x:10, y:10}
    ];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    apple = randomApple();
    score = 0;
    running = true;
    gameOver = false;
    updateHUD();
    if(loopId) clearTimeout(loopId);
    loop();
    document.getElementById('overlay').style.display = 'none';
  }

  function randomApple() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while(snake.some(s => s.x===pos.x && s.y===pos.y));
    return pos;
  }

  function currentInterval() {
    const lvl = Math.floor(score / SPEED_STEP);
    return Math.max(MIN_INTERVAL, BASE_INTERVAL - lvl * 15);
  }

  // ── GAME LOOP ────────────────────────────────────────────
  function loop() {
    if(!running) return;
    tick();
    draw();
    if(!gameOver) loopId = setTimeout(loop, currentInterval());
  }

  function tick() {
    dir = {...nextDir};

    // New head
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if(head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if(snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    if(head.x === apple.x && head.y === apple.y) {
      score++;
      if(score > best) best = score;
      updateHUD();
      playEat();
      apple = randomApple();
    } else {
      snake.pop();
    }
  }

  function endGame() {
    running = false;
    gameOver = true;
    playDie();
    showOverlay('Game Over', '', `Final score: ${score}`);
  }

  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('best-val').textContent  = best;
    const spd = Math.floor(score / SPEED_STEP) + 1;
    document.getElementById('speed-val').textContent = spd;
  }

  // ── DRAW ─────────────────────────────────────────────────
  function draw() {
    // Background
    ctx.fillStyle = COLORS.bg();
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = COLORS.grid();
    ctx.lineWidth = 0.5;
    for(let c=0; c<=COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke();
    }
    for(let r=0; r<=ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke();
    }

    // Apple
    drawApple(apple.x, apple.y);

    // Snake (body first, then head on top)
    for(let i = snake.length-1; i >= 0; i--) {
      drawSegment(snake[i], i);
    }
  }

  function drawSegment(seg, i) {
    const x = seg.x * CELL + 1;
    const y = seg.y * CELL + 1;
    const sz = CELL - 2;
    const r = i === 0 ? 6 : 4;

    // Glow for head
    if(i === 0) {
      ctx.save();
      ctx.shadowColor = '#3ddc84';
      ctx.shadowBlur  = 10;
    }

    ctx.fillStyle = i === 0 ? COLORS.snakeHead() :
                    i % 2 === 0 ? COLORS.snakeBody() : COLORS.snakeDark();
    roundRect(ctx, x, y, sz, sz, r);
    ctx.fill();

    if(i === 0) {
      // Eyes
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.fillStyle = '#0f1117';
      const ex = dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.65;
      const ex2= dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.25;
      const ey = dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.25;
      const ey2= dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.65;
      ctx.beginPath();
      ctx.arc(seg.x*CELL + CELL*ex,  seg.y*CELL + CELL*ey,  2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(seg.x*CELL + CELL*ex2, seg.y*CELL + CELL*ey2, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawApple(gx, gy) {
    const cx = gx * CELL + CELL/2;
    const cy = gy * CELL + CELL/2;
    const rad = CELL/2 - 2;

    ctx.save();
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = COLORS.apple();
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Shine
    ctx.fillStyle = COLORS.appleShine();
    ctx.beginPath();
    ctx.arc(cx - rad*0.25, cy - rad*0.3, rad*0.35, 0, Math.PI*2);
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - rad);
    ctx.quadraticCurveTo(cx + 4, cy - rad - 5, cx + 3, cy - rad - 7);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // ── SOUND ────────────────────────────────────────────────
  let audioCtx;
  function getAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playEat() {
    try {
      const ac = getAudio();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(440, ac.currentTime);
      o.frequency.linearRampToValueAtTime(880, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.12);
      o.start(); o.stop(ac.currentTime + 0.12);
    } catch(e) {}
  }
  function playDie() {
    try {
      const ac = getAudio();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sawtooth';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(220, ac.currentTime);
      o.frequency.linearRampToValueAtTime(80, ac.currentTime + 0.4);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.4);
      o.start(); o.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  // ── OVERLAY ──────────────────────────────────────────────
  function showOverlay(title, sub, fs) {
    const ov = document.getElementById('overlay');
    document.getElementById('ov-title').textContent = title;
    document.getElementById('ov-sub').textContent   = sub;
    const fsEl = document.getElementById('ov-fs');
    if(fs) { fsEl.textContent = fs; fsEl.style.display = ''; }
    else   { fsEl.style.display = 'none'; }
    document.getElementById('ov-btn').textContent = gameOver ? 'Play Again' : 'Start Game';
    ov.style.display = 'flex';
  }

  document.getElementById('ov-btn').addEventListener('click', () => {
    init();
  });

  // ── KEYBOARD ─────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp:    {x:0, y:-1},
      ArrowDown:  {x:0, y:1},
      ArrowLeft:  {x:-1, y:0},
      ArrowRight: {x:1, y:0},
    };
    const d = map[e.key];
    if(d) {
      e.preventDefault();
      // Prevent reverse
      if(d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  // ── TOUCH / SWIPE ─────────────────────────────────────────
  let tx0, ty0;
  canvas.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if(Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let nd;
    if(Math.abs(dx) > Math.abs(dy))
      nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    else
      nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if(nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }, {passive:false});

  // ── INITIAL DRAW ─────────────────────────────────────────
  // Draw blank board behind the start overlay
  snake = [{x:12,y:10},{x:11,y:10},{x:10,y:10}];
  dir = {x:1,y:0};
  apple = {x:17, y:10};
  score = 0;
  draw();
  updateHUD();
})();
</script>
